# =============================================================================
# controller_config.ini  —  SINGLE SOURCE OF TRUTH for axis configuration
# =============================================================================
# This file is read by BOTH:
#   - ControllerGUI.py (GUI on engineering laptop)
#   - tim_service/tim_rapidcode_adapter.py (TIM service on iPC400)
#
# If you change an axis parameter here, it takes effect on both sides
# automatically at next startup.  Do NOT duplicate axis parameters in
# tim_service/tim_config.yaml — that file is for service-level settings only.
#
# ---------------------------------------------------------------------------
# CALIBRATION CONSTANT for Axes A-D (MyActuator RMD EtherCAT motors)
# ---------------------------------------------------------------------------
# Motor:   MyActuator RMD-X12 / RMD-X8, P20 variant (20:1 planetary gearbox)
# Interface: EtherCAT ("E" suffix models)
#
# How the constant is derived:
#   The motor has a 17-bit absolute encoder (2^17 = 131,072 counts/rev).
#   The EtherCAT firmware handles the 20:1 gearbox INTERNALLY and reports
#   position as if the encoder sits directly on the OUTPUT shaft.
#   Therefore RapidCode sees 131,072 counts per one output shaft revolution.
#
#   scaling = 131072 / 360 = 364.0888...  counts per output degree
#   gearbox = 1  (gearbox is invisible to RapidCode — do not change this)
#
#   Verification: command 360 deg in RapidSetup → exactly 1 output revolution.
# ---------------------------------------------------------------------------

[Controller]
type = RSI_PC400

[CommMode1]
# TIM Motion Service on iPC400 (Axes A-D gateway)
type = RSI
ip_address = 192.168.1.151
port = 503
protocol = TCP
# Path to tim_config.yaml on the iPC400 (via network share).
# GUI writes axis parameters here at startup so the TIM service stays in sync.
# Change this if your network share is mapped differently.
tim_yaml_path = \\192.168.1.151\TIM_Service\tim_config.yaml

# [CommMode5] disabled - MyActuator via Waveshare CAN-to-Ethernet not in use
# ip = 192.168.0.7
# port = 20001
# motor_id = 1

[CommMode6]
# ClearCore servo controller (Axis E)
type = ClearCore
ip_address = 192.168.1.171
port = 8888
protocol = UDP
disable_cmd = S1B1 DISABLE
stop_cmd = S1B2 STOP

[AXIS_A]
description = Primary Rotation
min = 0
max = 180
pulses = 131072
degrees = 360
scaling = 364.0888
gearbox = 1
speed_min = 0
speed_max = 360
accel_min = 0
accel_max = 720
decel_min = 0
decel_max = 720

[AXIS_B]
