service:
  name: TIM Motion Service
  version: '1.0'
  log_level: INFO
  startup_delay_sec: 20
server:
  host: 0.0.0.0
  port: 503
  max_clients: 5
  client_timeout_sec: 5
rapidcode:
  ethercat_interface: Ethernet 1
  phantom_mode: false
  axes:
    A:
      name: Primary Rotation X12
      scaling: 364.0888
      gearbox: 1.0
      min_pos: 0
      max_pos: 180
      software_limit_deg: 180
      speed_min_dps: 0
      speed_max_dps: 360
      accel_min_dps2: 0
      accel_max_dps2: 720
      jerk: 20
    B:
      name: Secondary Rotation X8
      scaling: 364.0888
      gearbox: 1.0
      min_pos: 0
      max_pos: 180
      software_limit_deg: 180
      speed_min_dps: 0
      speed_max_dps: 360
      accel_min_dps2: 0
      accel_max_dps2: 720
      jerk: 20
    C:
      name: Tertiary Rotation X8
      scaling: 364.0888
      gearbox: 1.0
      min_pos: 0
      max_pos: 160
      software_limit_deg: 160
      speed_min_dps: 0
      speed_max_dps: 360
      accel_min_dps2: 0
      accel_max_dps2: 720
      jerk: 20
    D:
      name: Tertiary Lift X12
      scaling: 364.0888
      gearbox: 1.0
      min_pos: 0
      max_pos: 160
      software_limit_deg: 160
      speed_min_dps: 0
      speed_max_dps: 360
      accel_min_dps2: 0
      accel_max_dps2: 720
      jerk: 20
clearcore:
  ip_address: 192.168.1.171
  port: 8888
  phantom_mode: false
  axis_e:
    name: Address Angle (ClearCore Servo 5)
    min_pos: 0
    max_pos: 45
    software_limit_deg: 45
    speed_min_dps: 0
    speed_max_dps: 100
    accel_min_dps2: 0
    accel_max_dps2: 100
safety:
  enabled: true
  watchdog_timeout_sec: 10
  motion_timeout_sec: 30
  enable_fault_logging: true
  estop:
    action: STOP
    ramp_time_ms: 100
development:
  mock_rapidcode: false
  mock_clearcore: false
  verbose_logging: false
  log_all_commands: true
